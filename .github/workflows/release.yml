name: Release

on:
  release:
    types: [prereleased, released]
  push:
    branches:
      - main
      - v*
      - dev*
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0). Leave empty to use commit-based version.'
        required: false
        default: ''

jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, 386, arm64]
        goarm: ['']
        include:
          # Linux ARM variants
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: arm
            goarm: 6
          - goos: linux
            goarch: arm
            goarm: 5
      fail-fast: false

    runs-on: ubuntu-22.04
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: 0

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get the version
        id: get_version
        env:
          REF: ${{ github.ref }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ -n "$INPUT_TAG" ]]; then
            version="$INPUT_TAG"
          elif [[ "$REF" == "refs/tags/v"* ]]; then
            tag=$(git describe --tags $(git rev-list --tags --max-count=1))
            version=${tag}
          else
            date=$(git log -1 --format="%cd" --date=short | sed s/-//g)
            count=$(git rev-list --count HEAD)
            commit=$(git rev-parse --short HEAD)
            version="test-$date.r${count}.$commit"
          fi
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Show workflow information
        id: get_filename
        run: |
          export _NAME=$(jq ".[\"$GOOS-$GOARCH$GOARM\"].friendlyName" -r < release/friendly-filenames.json)
          echo "GOOS: $GOOS, GOARCH: $GOARCH, GOARM: $GOARM, RELEASE_NAME: $_NAME"
          echo "ASSET_NAME=$_NAME" >> "$GITHUB_OUTPUT"
          echo "ASSET_NAME=$_NAME" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Get project dependencies
        run: go mod download

      - name: Build gg
        run: |
          go build -v -o gg-${ASSET_NAME} -trimpath -ldflags "-X github.com/mzz2017/gg/cmd.Version=${{ steps.get_version.outputs.VERSION }} -s -w -buildid=" .

      - name: UPX compress
        if: matrix.goos == 'linux' && (matrix.goarch == 'amd64' || matrix.goarch == 'arm64' || matrix.goarch == 'arm' || matrix.goarch == '386')
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx gg-${ASSET_NAME} || true

      - name: Smoking test
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: chmod +x ./gg-$ASSET_NAME && ./gg-$ASSET_NAME --version

      - name: Signature
        run: |
          FILE=./gg-${ASSET_NAME}
          DGST=$FILE.dgst
          openssl dgst -md5    $FILE | sed 's/([^)]*)//g' >>$DGST
          openssl dgst -sha1   $FILE | sed 's/([^)]*)//g' >>$DGST
          openssl dgst -sha256 $FILE | sed 's/([^)]*)//g' >>$DGST
          openssl dgst -sha512 $FILE | sed 's/([^)]*)//g' >>$DGST

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gg-${{ steps.get_filename.outputs.ASSET_NAME }}
          path: |
            gg-${{ steps.get_filename.outputs.ASSET_NAME }}*

      - name: Upload files to GitHub release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: ./gg-${{ steps.get_filename.outputs.ASSET_NAME }}*
          overwrite: true
          tag: ${{ github.ref }}
